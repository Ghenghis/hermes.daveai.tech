<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="1000" height="750">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <linearGradient id="grad-start" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#c53030;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-step" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-agent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9f7aea;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#805ad5;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-verify" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#38a169;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-iter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed8936;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#dd6b20;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-final" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38a169;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#276749;stop-opacity:0.15"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="500" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2d3748">Code Generation Workflow</text>

  <!-- Start Node -->
  <rect x="400" y="55" width="200" height="50" rx="25" fill="url(#grad-start)" stroke="#c53030" stroke-width="2"/>
  <text x="500" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#c53030">Code Request</text>

  <!-- Arrow to Spec -->
  <path d="M 500 105 L 500 135" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 1: Specification -->
  <rect x="300" y="140" width="400" height="60" rx="8" fill="url(#grad-step)" stroke="#3182ce" stroke-width="2"/>
  <text x="500" y="168" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2b6cb0">Step 1: Requirements Analysis &amp; Specification</text>
  <text x="500" y="188" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">SpecGenerator analyzes requirements and creates detailed spec</text>

  <!-- Arrow to Code Gen -->
  <path d="M 500 200 L 500 230" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Code Generation -->
  <rect x="100" y="240" width="800" height="100" rx="8" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="500" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#6b46c1">Step 2: Code Generation (CodeGen Agent)</text>
  
  <!-- Code generation components -->
  <rect x="120" y="280" width="230" height="50" rx="6" fill="url(#grad-agent)" stroke="#805ad5" stroke-width="1.5"/>
  <text x="235" y="305" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#6b46c1">Generate Code</text>
  <text x="235" y="322" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">Creates initial implementation</text>

  <rect x="385" y="280" width="230" height="50" rx="6" fill="url(#grad-agent)" stroke="#805ad5" stroke-width="1.5"/>
  <text x="500" y="305" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#6b46c1">Generate Tests</text>
  <text x="500" y="322" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">Creates unit tests</text>

  <rect x="650" y="280" width="230" height="50" rx="6" fill="url(#grad-agent)" stroke="#805ad5" stroke-width="1.5"/>
  <text x="765" y="305" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#6b46c1">Generate Docs</text>
  <text x="765" y="322" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">Creates documentation</text>

  <!-- Arrow to Review -->
  <path d="M 500 340 L 500 370" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Code Review Loop -->
  <rect x="150" y="380" width="700" height="130" rx="8" fill="url(#grad-iter)" stroke="#dd6b20" stroke-width="2"/>
  <text x="500" y="405" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#c05621">Step 3: Code Review Loop (max 3 iterations)</text>

  <!-- Review components -->
  <rect x="170" y="420" width="180" height="40" rx="6" fill="#feebc8" stroke="#dd6b20" stroke-width="1.5"/>
  <text x="260" y="445" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#c05621">Reviewer Agent</text>

  <path d="M 350 440 L 400 440" fill="none" stroke="#dd6b20" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="400" y="420" width="200" height="40" rx="6" fill="#fff5f5" stroke="#c53030" stroke-width="1.5"/>
  <text x="500" y="438" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#c53030">Issues Found?</text>
  <text x="500" y="452" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">YES → Fix Code</text>

  <path d="M 600 440 L 650 440" fill="none" stroke="#38a169" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="650" y="420" width="180" height="40" rx="6" fill="#c6f6d5" stroke="#38a169" stroke-width="1.5"/>
  <text x="740" y="445" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#276749">Approved</text>

  <!-- Iteration arrow back -->
  <path d="M 500 460 L 500 490 L 200 490 L 200 440" fill="none" stroke="#e53e3e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="350" y="485" font-family="Arial, sans-serif" font-size="9" fill="#e53e3e">Fix issues (iterate)</text>

  <!-- Continue arrow -->
  <path d="M 740 460 L 740 490 L 500 490 L 500 520" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="620" y="505" font-family="Arial, sans-serif" font-size="9" fill="#718096">Continue to next step</text>

  <!-- Step 4: Testing -->
  <rect x="300" y="530" width="400" height="60" rx="8" fill="url(#grad-step)" stroke="#3182ce" stroke-width="2"/>
  <text x="500" y="558" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2b6cb0">Step 4: Test Execution</text>
  <text x="500" y="578" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Run unit tests and verify all pass</text>

  <!-- Arrow to Final -->
  <path d="M 500 590 L 500 620" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Final Output -->
  <rect x="250" y="630" width="500" height="90" rx="8" fill="url(#grad-final)" stroke="#276749" stroke-width="3"/>
  <text x="500" y="660" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#276749">Final Code Package</text>
  
  <rect x="270" y="680" width="100" height="25" rx="4" fill="#c6f6d5" stroke="#276749" stroke-width="1"/>
  <text x="320" y="697" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#276749">Code</text>
  
  <rect x="390" y="680" width="100" height="25" rx="4" fill="#c6f6d5" stroke="#276749" stroke-width="1"/>
  <text x="440" y="697" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#276749">Tests</text>
  
  <rect x="510" y="680" width="100" height="25" rx="4" fill="#c6f6d5" stroke="#276749" stroke-width="1"/>
  <text x="560" y="697" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#276749">Docs</text>
  
  <rect x="630" y="680" width="100" height="25" rx="4" fill="#c6f6d5" stroke="#276749" stroke-width="1"/>
  <text x="680" y="697" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#276749">Review Log</text>

  <!-- Legend -->
  <rect x="50" y="60" width="150" height="120" rx="4" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="125" y="80" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2d3748">Legend</text>
  
  <rect x="60" y="95" width="20" height="12" rx="2" fill="url(#grad-agent)" stroke="#805ad5" stroke-width="1"/>
  <text x="90" y="105" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Agent Task</text>
  
  <rect x="60" y="115" width="20" height="12" rx="2" fill="url(#grad-iter)" stroke="#dd6b20" stroke-width="1"/>
  <text x="90" y="125" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Iteration Loop</text>
  
  <rect x="60" y="135" width="20" height="12" rx="2" fill="url(#grad-verify)" stroke="#38a169" stroke-width="1"/>
  <text x="90" y="145" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Verification</text>
  
  <rect x="60" y="155" width="20" height="12" rx="2" fill="#c6f6d5" stroke="#276749" stroke-width="1"/>
  <text x="90" y="165" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Final Output</text>

  <!-- Workflow Metrics -->
  <rect x="800" y="100" width="170" height="130" rx="4" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="885" y="120" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2d3748">Workflow Metrics</text>
  <text x="815" y="145" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Max Iterations: 3</text>
  <text x="815" y="160" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Agents: Spec, Code, Review</text>
  <text x="815" y="175" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Review Loop: Yes</text>
  <text x="815" y="190" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Test Phase: Yes</text>
  <text x="815" y="205" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Est. Time: ~1-5 min</text>
  <text x="815" y="220" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Output: Code + Tests + Docs</text>

</svg>
