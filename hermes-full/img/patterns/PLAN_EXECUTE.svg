<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <linearGradient id="grad-plan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9f7aea;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#805ad5;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-execute" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#38a169;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-step" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2d3748">Plan-and-Execute Pattern</text>

  <!-- PLANNING Phase Box -->
  <rect x="50" y="60" width="350" height="200" rx="12" fill="url(#grad-plan)" stroke="#805ad5" stroke-width="3"/>
  <text x="225" y="90" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#6b46c1">PLANNING PHASE</text>
  
  <!-- Planning Steps -->
  <rect x="70" y="110" width="310" height="40" rx="6" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="225" y="130" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#553c9a">1. Analyze Goal &amp; Context</text>
  <text x="225" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#718096">Understand requirements, gather context</text>

  <path d="M 225 150 L 225 170" fill="none" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="70" y="170" width="310" height="40" rx="6" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="225" y="190" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#553c9a">2. Create Execution Plan</text>
  <text x="225" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#718096">Break down into ordered steps</text>

  <path d="M 225 210 L 225 230" fill="none" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="70" y="230" width="310" height="25" rx="6" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="225" y="247" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#276749">✓ Plan Verified - Ready to Execute</text>

  <!-- Arrow: Planning to Execution -->
  <path d="M 400 160 L 500 160" fill="none" stroke="#4a5568" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowhead)"/>
  <text x="450" y="150" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#718096">plan</text>

  <!-- EXECUTION Phase Box -->
  <rect x="500" y="60" width="350" height="200" rx="12" fill="url(#grad-execute)" stroke="#38a169" stroke-width="3"/>
  <text x="675" y="90" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#276749">EXECUTION PHASE</text>
  
  <!-- Execution Steps -->
  <rect x="520" y="110" width="310" height="35" rx="6" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="675" y="130" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#276749">Step 1 → Step 2 → Step 3 → ...</text>

  <rect x="520" y="150" width="100" height="50" rx="6" fill="url(#grad-step)" stroke="#3182ce" stroke-width="1"/>
  <text x="570" y="172" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2b6cb0">Step 1</text>
  <text x="570" y="188" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">tool_call</text>

  <path d="M 620 175 L 640 175" fill="none" stroke="#38a169" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="640" y="150" width="100" height="50" rx="6" fill="url(#grad-step)" stroke="#3182ce" stroke-width="1"/>
  <text x="690" y="172" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2b6cb0">Step 2</text>
  <text x="690" y="188" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">tool_call</text>

  <path d="M 740 175 L 760 175" fill="none" stroke="#38a169" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="760" y="150" width="80" height="50" rx="6" fill="url(#grad-step)" stroke="#3182ce" stroke-width="1"/>
  <text x="800" y="172" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2b6cb0">...</text>
  <text x="800" y="188" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">...</text>

  <rect x="520" y="210" width="310" height="25" rx="6" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="675" y="227" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#276749">All steps completed</text>

  <!-- Arrow: Execution to Synthesis -->
  <path d="M 675 260 L 675 310" fill="none" stroke="#4a5568" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- RESULT/SYNTHESIS Box -->
  <rect x="400" y="320" width="200" height="80" rx="12" fill="#e9d8fd" stroke="#805ad5" stroke-width="3"/>
  <text x="500" y="355" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#6b46c1">Synthesize</text>
  <text x="500" y="375" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">Combine results</text>
  <text x="500" y="395" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">Final output</text>

  <!-- Replan Arrow -->
  <path d="M 500 380 L 600 380 L 600 160 L 540 160" fill="none" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="610" y="270" font-family="Arial, sans-serif" font-size="10" fill="#e53e3e">replan if</text>
  <text x="610" y="282" font-family="Arial, sans-serif" font-size="10" fill="#e53e3e">step fails</text>

  <!-- Legend / Key Features -->
  <rect x="50" y="440" width="800" height="130" rx="8" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="450" y="465" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3748">Key Characteristics</text>
  
  <!-- Feature boxes -->
  <rect x="70" y="480" width="180" height="35" rx="4" fill="#feebc8" stroke="#dd6b20" stroke-width="1"/>
  <text x="160" y="498" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#c05621">Planning Overhead</text>
  <text x="160" y="510" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">One-time upfront planning</text>

  <rect x="270" y="480" width="180" height="35" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="360" y="498" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#276749">Fast Execution</text>
  <text x="360" y="510" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Execute steps without replanning</text>

  <rect x="470" y="480" width="180" height="35" rx="4" fill="#bee3f8" stroke="#3182ce" stroke-width="1"/>
  <text x="560" y="498" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2b6cb0">Parallelizable</text>
  <text x="560" y="510" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Independent steps can run in parallel</text>

  <rect x="670" y="480" width="160" height="35" rx="4" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="750" y="498" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#6b46c1">Can Replan</text>
  <text x="750" y="510" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">On failure, create new plan</text>

  <text x="450" y="545" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Best for: Complex multi-step tasks with known decomposable subtasks | NOT for: Dynamic, reactive tasks</text>

</svg>
