<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <linearGradient id="grad-root" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#c53030;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-node" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-leaf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#38a169;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-pruned" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a0aec0;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#718096;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="500" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2d3748">Tree of Thoughts (ToT) Pattern</text>

  <!-- Root Node -->
  <rect x="375" y="55" width="250" height="60" rx="10" fill="url(#grad-root)" stroke="#c53030" stroke-width="3"/>
  <text x="500" y="80" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#c53030">PROBLEM</text>
  <text x="500" y="100" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#742a2a">Initial problem statement</text>

  <!-- Level 1 Branches -->
  <path d="M 450 115 L 200 165" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 500 115 L 500 165" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 550 115 L 800 165" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Level 1 Nodes -->
  <rect x="100" y="170" width="200" height="55" rx="8" fill="url(#grad-node)" stroke="#3182ce" stroke-width="2"/>
  <text x="200" y="195" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#2b6cb0">Thought A</text>
  <text x="200" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">Score: 0.7</text>

  <rect x="400" y="170" width="200" height="55" rx="8" fill="url(#grad-node)" stroke="#3182ce" stroke-width="2"/>
  <text x="500" y="195" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#2b6cb0">Thought B</text>
  <text x="500" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">Score: 0.9 ★</text>

  <rect x="700" y="170" width="200" height="55" rx="8" fill="url(#grad-node)" stroke="#3182ce" stroke-width="2"/>
  <text x="800" y="195" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#2b6cb0">Thought C</text>
  <text x="800" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">Score: 0.5</text>

  <!-- Level 2 Branches from A -->
  <path d="M 150 225 L 80 275" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M 200 225 L 270 275" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Level 2 Branches from B (best path) -->
  <path d="M 450 225 L 380 275" fill="none" stroke="#38a169" stroke-width="2"/>
  <path d="M 500 225 L 500 275" fill="none" stroke="#38a169" stroke-width="2"/>
  <path d="M 550 225 L 620 275" fill="none" stroke="#38a169" stroke-width="2"/>

  <!-- Level 2 Branches from C -->
  <path d="M 750 225 L 750 275" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M 850 225 L 920 275" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Level 2 Nodes -->
  <!-- A's children -->
  <rect x="30" y="280" width="100" height="45" rx="6" fill="url(#grad-pruned)" stroke="#a0aec0" stroke-width="1.5"/>
  <text x="80" y="302" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#718096">A1</text>
  <text x="80" y="318" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#a0aec0">Pruned: 0.2</text>

  <rect x="220" y="280" width="100" height="45" rx="6" fill="url(#grad-node)" stroke="#3182ce" stroke-width="1.5"/>
  <text x="270" y="302" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#2b6cb0">A2</text>
  <text x="270" y="318" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Score: 0.6</text>

  <!-- B's children (explored more) -->
  <rect x="330" y="280" width="100" height="45" rx="6" fill="url(#grad-leaf)" stroke="#38a169" stroke-width="2"/>
  <text x="380" y="302" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#276749">B1 ★</text>
  <text x="380" y="318" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#276749">Best: 0.95</text>

  <rect x="450" y="280" width="100" height="45" rx="6" fill="url(#grad-node)" stroke="#3182ce" stroke-width="1.5"/>
  <text x="500" y="302" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#2b6cb0">B2</text>
  <text x="500" y="318" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Score: 0.8</text>

  <rect x="570" y="280" width="100" height="45" rx="6" fill="url(#grad-leaf)" stroke="#38a169" stroke-width="2"/>
  <text x="620" y="302" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#276749">B3 ★</text>
  <text x="620" y="318" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#276749">Best: 0.92</text>

  <!-- C's children (mostly pruned) -->
  <rect x="700" y="280" width="100" height="45" rx="6" fill="url(#grad-pruned)" stroke="#a0aec0" stroke-width="1.5"/>
  <text x="750" y="302" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#718096">C1</text>
  <text x="750" y="318" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#a0aec0">Pruned: 0.15</text>

  <rect x="870" y="280" width="100" height="45" rx="6" fill="url(#grad-pruned)" stroke="#a0aec0" stroke-width="1.5"/>
  <text x="920" y="302" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#718096">C2</text>
  <text x="920" y="318" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#a0aec0">Pruned: 0.1</text>

  <!-- Level 3 Branches from B2 -->
  <path d="M 460 325 L 430 375" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M 500 325 L 500 375" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M 540 325 L 570 375" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Level 3 Nodes -->
  <rect x="380" y="380" width="100" height="45" rx="6" fill="url(#grad-leaf)" stroke="#38a169" stroke-width="2"/>
  <text x="430" y="402" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#276749">B2a ★</text>
  <text x="430" y="418" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#276749">Best: 0.98</text>

  <rect x="450" y="380" width="100" height="45" rx="6" fill="url(#grad-node)" stroke="#3182ce" stroke-width="1.5"/>
  <text x="500" y="402" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#2b6cb0">B2b</text>
  <text x="500" y="418" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Score: 0.75</text>

  <rect x="520" y="380" width="100" height="45" rx="6" fill="url(#grad-leaf)" stroke="#38a169" stroke-width="2"/>
  <text x="570" y="402" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#276749">B2c</text>
  <text x="570" y="418" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Score: 0.7</text>

  <!-- Best Path Highlight -->
  <path d="M 500 55 L 500 170 L 500 225 L 500 280 L 430 325 L 430 380" 
        fill="none" stroke="#38a169" stroke-width="4" stroke-dasharray="10,5" opacity="0.5"/>

  <!-- Legend -->
  <rect x="50" y="480" width="900" height="190" rx="8" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="500" y="505" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3748">Tree of Thoughts Process</text>

  <!-- Process Steps -->
  <rect x="70" y="520" width="200" height="40" rx="6" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="170" y="540" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#6b46c1">1. Generate</text>
  <text x="170" y="555" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">Create multiple thought branches</text>

  <path d="M 270 540 L 300 540" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="300" y="520" width="200" height="40" rx="6" fill="#bee3f8" stroke="#3182ce" stroke-width="1"/>
  <text x="400" y="540" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2b6cb0">2. Evaluate</text>
  <text x="400" y="555" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">Score each thought path</text>

  <path d="M 500 540 L 530 540" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="530" y="520" width="200" height="40" rx="6" fill="#feebc8" stroke="#dd6b20" stroke-width="1"/>
  <text x="630" y="540" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#c05621">3. Prune</text>
  <text x="630" y="555" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">Remove low-scoring branches</text>

  <path d="M 730 540 L 760 540" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="760" y="520" width="170" height="40" rx="6" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="845" y="540" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#276749">4. Select Best</text>
  <text x="845" y="555" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">Return winning path</text>

  <!-- Use Cases -->
  <text x="500" y="595" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2d3748">Best for: Strategic planning, complex decision-making, exploration vs exploitation tradeoffs</text>

  <!-- Status Legend -->
  <rect x="80" y="610" width="20" height="20" rx="4" fill="url(#grad-root)" stroke="#c53030" stroke-width="1"/>
  <text x="110" y="625" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Problem</text>

  <rect x="170" y="610" width="20" height="20" rx="4" fill="url(#grad-node)" stroke="#3182ce" stroke-width="1"/>
  <text x="200" y="625" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Active</text>

  <rect x="260" y="610" width="20" height="20" rx="4" fill="url(#grad-leaf)" stroke="#38a169" stroke-width="1"/>
  <text x="290" y="625" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Best Solution</text>

  <rect x="390" y="610" width="20" height="20" rx="4" fill="url(#grad-pruned)" stroke="#a0aec0" stroke-width="1"/>
  <text x="420" y="625" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Pruned</text>

  <line x1="500" y1="620" x2="600" y2="620" stroke="#38a169" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="620" y="625" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Best Path</text>

</svg>
