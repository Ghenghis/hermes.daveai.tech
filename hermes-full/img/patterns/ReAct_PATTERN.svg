<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <linearGradient id="grad-thought" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-action" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#38a169;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-observe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed8936;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#dd6b20;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-loop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9f7aea;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#805ad5;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2d3748">ReAct Pattern - Reasoning + Acting Cycle</text>

  <!-- Outer loop representing the cycle -->
  <ellipse cx="450" cy="270" rx="350" ry="180" fill="none" stroke="#805ad5" stroke-width="3" stroke-dasharray="15,10"/>
  <text x="450" y="85" font-family="Arial, sans-serif" font-size="14" font-style="italic" text-anchor="middle" fill="#805ad5">Continuous Loop Until Task Complete</text>

  <!-- THINK Box -->
  <rect x="100" y="150" width="200" height="100" rx="12" fill="url(#grad-thought)" stroke="#3182ce" stroke-width="3"/>
  <text x="200" y="185" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2b6cb0">THINK</text>
  <text x="200" y="210" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Reason about current state</text>
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Analyze observations</text>
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#718096">"What should I do next?"</text>

  <!-- Arrow: THINK to ACTION -->
  <path d="M 300 200 L 350 200" fill="none" stroke="#4a5568" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="325" y="190" font-family="Arial, sans-serif" font-size="10" fill="#718096">decide</text>

  <!-- ACTION Box -->
  <rect x="350" y="150" width="200" height="100" rx="12" fill="url(#grad-action)" stroke="#38a169" stroke-width="3"/>
  <text x="450" y="185" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#276749">ACTION</text>
  <text x="450" y="210" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Execute tool/call</text>
  <text x="450" y="230" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Take a step</text>
  <text x="450" y="250" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#718096">web_search(query="...")</text>

  <!-- Arrow: ACTION to OBSERVE -->
  <path d="M 550 200 L 600 200" fill="none" stroke="#4a5568" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="575" y="190" font-family="Arial, sans-serif" font-size="10" fill="#718096">result</text>

  <!-- OBSERVE Box -->
  <rect x="600" y="150" width="200" height="100" rx="12" fill="url(#grad-observe)" stroke="#dd6b20" stroke-width="3"/>
  <text x="700" y="185" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#c05621">OBSERVE</text>
  <text x="700" y="210" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Get tool output</text>
  <text x="700" y="230" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Update context</text>
  <text x="700" y="250" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#718096">"Got 5 results"</text>

  <!-- Arrow: OBSERVE back to THINK (loop) -->
  <path d="M 700 250 Q 700 350 450 380 Q 200 350 200 250" fill="none" stroke="#4a5568" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="450" y="400" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#4a5568">Loop: new context informs next thought</text>

  <!-- Tool Examples Box -->
  <rect x="100" y="420" width="700" height="60" rx="8" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="450" y="445" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3748">Example Tools Used in ReAct</text>
  
  <rect x="130" y="455" width="120" height="20" rx="4" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="190" y="469" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#6b46c1">web_search</text>
  
  <rect x="270" y="455" width="120" height="20" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="330" y="469" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#276749">code_execute</text>
  
  <rect x="410" y="455" width="120" height="20" rx="4" fill="#feebc8" stroke="#dd6b20" stroke-width="1"/>
  <text x="470" y="469" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#c05621">file_read</text>
  
  <rect x="550" y="455" width="120" height="20" rx="4" fill="#bee3f8" stroke="#3182ce" stroke-width="1"/>
  <text x="610" y="469" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2b6cb0">calculator</text>
  
  <rect x="690" y="455" width="80" height="20" rx="4" fill="#c3dafe" stroke="#5a67d8" stroke-width="1"/>
  <text x="730" y="469" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#5a67d8">...</text>

</svg>
