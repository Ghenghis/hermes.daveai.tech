<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650">
  <defs>
    <linearGradient id="detectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="generateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="storeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="retrieveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="improveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="white"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="650" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="500" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Voyager Skill Acquisition Pattern</text>
  <text x="500" y="55" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">Continuous Learning: Detect → Generate → Store → Retrieve → Improve</text>
  
  <!-- Main Cycle -->
  <g transform="translate(500, 300)">
    <!-- Outer ring representing continuous learning -->
    <circle cx="0" cy="0" r="220" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="50"/>
    
    <!-- Detect Phase -->
    <g transform="translate(-180, -80)">
      <rect x="0" y="0" width="140" height="90" rx="10" fill="url(#detectGrad)" filter="url(#shadow)"/>
      <text x="70" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">1. DETECT</text>
      <text x="70" y="50" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Novel Situation</text>
      <text x="70" y="65" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Gap Identification</text>
      <text x="70" y="80" font-family="Courier New, monospace" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">!skill_missing</text>
    </g>
    
    <!-- Generate Phase -->
    <g transform="translate(40, -160)">
      <rect x="0" y="0" width="140" height="90" rx="10" fill="url(#generateGrad)" filter="url(#shadow)"/>
      <text x="70" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">2. GENERATE</text>
      <text x="70" y="50" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Code Synthesis</text>
      <text x="70" y="65" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Skill Creation</text>
      <text x="70" y="80" font-family="Courier New, monospace" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">write_skill()</text>
    </g>
    
    <!-- Store Phase -->
    <g transform="translate(180, -80)">
      <rect x="0" y="0" width="140" height="90" rx="10" fill="url(#storeGrad)" filter="url(#shadow)"/>
      <text x="70" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">3. STORE</text>
      <text x="70" y="50" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Skill Registry</text>
      <text x="70" y="65" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Metadata Index</text>
      <text x="70" y="80" font-family="Courier New, monospace" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">skill.save()</text>
    </g>
    
    <!-- Retrieve Phase -->
    <g transform="translate(40, 70)">
      <rect x="0" y="0" width="140" height="90" rx="10" fill="url(#retrieveGrad)" filter="url(#shadow)"/>
      <text x="70" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">4. RETRIEVE</text>
      <text x="70" y="50" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Context Matching</text>
      <text x="70" y="65" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Skill Lookup</text>
      <text x="70" y="80" font-family="Courier New, monospace" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">skill.get()</text>
    </g>
    
    <!-- Improve Phase -->
    <g transform="translate(-100, 70)">
      <rect x="0" y="0" width="140" height="90" rx="10" fill="url(#improveGrad)" filter="url(#shadow)"/>
      <text x="70" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">5. IMPROVE</text>
      <text x="70" y="50" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Feedback Loop</text>
      <text x="70" y="65" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Iterative Refinement</text>
      <text x="70" y="80" font-family="Courier New, monospace" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">skill.update()</text>
    </g>
    
    <!-- Curved arrows between phases -->
    <path d="M-120 -35 Q-60 -100 20 -140" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <path d="M90 -140 Q150 -100 160 -35" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <path d="M160 35 Q150 100 90 140" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <path d="M-30 140 Q-90 100 -100 35" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <path d="M-120 35 Q-150 -20 -120 -35" stroke="white" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Skill Library -->
  <g transform="translate(50, 480)">
    <rect x="0" y="0" width="250" height="150" rx="10" fill="rgba(255,255,255,0.1)" filter="url(#shadow)"/>
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Skill Library</text>
    
    <!-- Skill entries -->
    <rect x="10" y="40" width="230" height="30" rx="5" fill="rgba(102,126,234,0.3)"/>
    <text x="20" y="58" font-family="Courier New, monospace" font-size="9" fill="white">web_scraper_v2</text>
    <text x="150" y="58" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.6)">uses: 47</text>
    <text x="200" y="58" font-family="Arial, sans-serif" font-size="8" fill="#43e97b">● active</text>
    
    <rect x="10" y="75" width="230" height="30" rx="5" fill="rgba(79,172,254,0.3)"/>
    <text x="20" y="93" font-family="Courier New, monospace" font-size="9" fill="white">api_caller_v1</text>
    <text x="150" y="93" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.6)">uses: 123</text>
    <text x="200" y="93" font-family="Arial, sans-serif" font-size="8" fill="#43e97b">● active</text>
    
    <rect x="10" y="110" width="230" height="30" rx="5" fill="rgba(240,147,251,0.3)"/>
    <text x="20" y="128" font-family="Courier New, monospace" font-size="9" fill="white">data_parser_v3</text>
    <text x="150" y="128" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.6)">uses: 89</text>
    <text x="200" y="128" font-family="Arial, sans-serif" font-size="8" fill="#43e97b">● active</text>
  </g>
  
  <!-- Skill Generation Process -->
  <g transform="translate(350, 480)">
    <rect x="0" y="0" width="300" height="150" rx="10" fill="rgba(102,126,234,0.15)" filter="url(#shadow)"/>
    <text x="150" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Skill Generation Pipeline</text>
    
    <!-- Pipeline steps -->
    <g transform="translate(15, 45)">
      <rect x="0" y="0" width="60" height="40" rx="5" fill="rgba(240,147,251,0.4)"/>
      <text x="30" y="18" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Task</text>
      <text x="30" y="32" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Analysis</text>
      
      <path d="M65 20 L80 20" stroke="white" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
      
      <rect x="85" y="0" width="60" height="40" rx="5" fill="rgba(102,126,234,0.4)"/>
      <text x="115" y="18" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Code</text>
      <text x="115" y="32" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Synthesis</text>
      
      <path d="M150 20 L165 20" stroke="white" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
      
      <rect x="170" y="0" width="60" height="40" rx="5" fill="rgba(79,172,254,0.4)"/>
      <text x="200" y="18" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Test</text>
      <text x="200" y="32" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Validation</text>
      
      <path d="M235 20 L250 20" stroke="white" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
      
      <rect x="255" y="0" width="40" height="40" rx="5" fill="rgba(67,233,123,0.4)"/>
      <text x="275" y="25" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">✓</text>
    </g>
    
    <!-- Example -->
    <text x="150" y="105" font-family="Courier New, monospace" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Input: Novel API format detected</text>
    <text x="150" y="120" font-family="Courier New, monospace" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Output: custom_parser_v1.0.0</text>
  </g>
  
  <!-- Context Matching -->
  <g transform="translate(700, 480)">
    <rect x="0" y="0" width="250" height="150" rx="10" fill="rgba(67,233,123,0.15)" filter="url(#shadow)"/>
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Context-Based Retrieval</text>
    
    <!-- Matching visualization -->
    <rect x="10" y="40" width="230" height="35" rx="5" fill="rgba(0,0,0,0.3)"/>
    <text x="20" y="58" font-family="Arial, sans-serif" font-size="10" fill="white">Task Context:</text>
    <text x="100" y="58" font-family="Courier New, monospace" font-size="9" fill="#4facfe">"parse JSON API"</text>
    
    <text x="125" y="90" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">↓ similarity match</text>
    
    <rect x="10" y="100" width="230" height="35" rx="5" fill="rgba(67,233,123,0.3)"/>
    <text x="20" y="118" font-family="Arial, sans-serif" font-size="10" fill="white">Best Match:</text>
    <text x="110" y="118" font-family="Courier New, monospace" font-size="9" fill="#43e97b">json_parser_v2</text>
    <text x="200" y="118" font-family="Arial, sans-serif" font-size="8" fill="#43e97b">92%</text>
  </g>
  
  <!-- Code Snippet -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="400" height="120" rx="5" fill="rgba(0,0,0,0.4)"/>
    <text x="10" y="20" font-family="Courier New, monospace" font-size="10" fill="#43e97b">class SkillLibrary:</text>
    <text x="20" y="35" font-family="Courier New, monospace" font-size="10" fill="rgba(255,255,255,0.8)">def detect_skill_gap(self, task):</text>
    <text x="30" y="50" font-family="Courier New, monospace" font-size="10" fill="rgba(255,255,255,0.8)">if not self.has_skill(task):</text>
    <text x="40" y="65" font-family="Courier New, monospace" font-size="10" fill="#f5576c">return self.generate_skill(task)</text>
    <text x="20" y="80" font-family="Courier New, monospace" font-size="10" fill="rgba(255,255,255,0.8)">def improve_skill(self, skill, feedback):</text>
    <text x="30" y="95" font-family="Courier New, monospace" font-size="10" fill="rgba(255,255,255,0.8)">skill.update(feedback)</text>
    <text x="30" y="110" font-family="Courier New, monospace" font-size="10" fill="rgba(255,255,255,0.8)">skill.score = self.evaluate(skill)</text>
  </g>
  
  <!-- Key Features -->
  <g transform="translate(500, 80)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Key Features:</text>
    
    <rect x="0" y="15" width="15" height="15" rx="3" fill="url(#detectGrad)"/>
    <text x="25" y="27" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Detect: Identifies missing capabilities</text>
    
    <rect x="0" y="40" width="15" height="15" rx="3" fill="url(#generateGrad)"/>
    <text x="25" y="52" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Generate: Creates new skills from scratch</text>
    
    <rect x="0" y="65" width="15" height="15" rx="3" fill="url(#storeGrad)"/>
    <text x="25" y="77" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Store: Persists skills with metadata</text>
    
    <rect x="0" y="90" width="15" height="15" rx="3" fill="url(#retrieveGrad)"/>
    <text x="25" y="102" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Retrieve: Context-aware skill lookup</text>
  </g>
  
  <!-- Feedback Loop -->
  <g transform="translate(700, 80)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Feedback Loop:</text>
    
    <rect x="0" y="15" width="250" height="60" rx="5" fill="rgba(250,112,154,0.2)"/>
    <text x="125" y="40" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Skill Execution</text>
    <text x="125" y="58" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">↓ success/failure feedback</text>
    
    <path d="M125 75 L125 95" stroke="white" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    
    <rect x="0" y="100" width="250" height="40" rx="5" fill="rgba(254,225,64,0.2)"/>
    <text x="125" y="125" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Skill Update &amp; Version Bump</text>
  </g>
</svg>
