<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <linearGradient id="grad-think" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-plan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9f7aea;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#805ad5;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-act" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#38a169;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-observe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed8936;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#dd6b20;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-memory" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fd1c5;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#38b2ac;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#2d3748">Agent Execution Loop (ReAct Pattern)</text>

  <!-- Central Loop Circle -->
  <circle cx="450" cy="300" r="180" fill="none" stroke="#e2e8f0" stroke-width="3" stroke-dasharray="10,5"/>

  <!-- Think Node -->
  <rect x="350" y="80" width="200" height="80" rx="40" fill="url(#grad-think)" stroke="#3182ce" stroke-width="2"/>
  <text x="450" y="115" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2b6cb0">THINK</text>
  <text x="450" y="140" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Reason about the task</text>
  <text x="450" y="155" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#718096">Analyze context, constraints</text>

  <!-- Plan Node -->
  <rect x="570" y="220" width="200" height="80" rx="40" fill="url(#grad-plan)" stroke="#805ad5" stroke-width="2"/>
  <text x="670" y="255" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#6b46c1">PLAN</text>
  <text x="670" y="280" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Plan next action(s)</text>
  <text x="670" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#718096">Select tool, formulate args</text>

  <!-- Act Node -->
  <rect x="350" y="360" width="200" height="80" rx="40" fill="url(#grad-act)" stroke="#38a169" stroke-width="2"/>
  <text x="450" y="395" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#276749">ACT</text>
  <text x="450" y="420" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Execute the action</text>
  <text x="450" y="435" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#718096">Call tool, run code</text>

  <!-- Observe Node -->
  <rect x="130" y="220" width="200" height="80" rx="40" fill="url(#grad-observe)" stroke="#dd6b20" stroke-width="2"/>
  <text x="230" y="255" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#c05621">OBSERVE</text>
  <text x="230" y="280" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Observe the result</text>
  <text x="230" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#718096">Process tool output</text>

  <!-- Arrows in the loop -->
  <!-- Think to Plan -->
  <path d="M 500 140 Q 580 140 620 220" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Plan to Act -->
  <path d="M 670 300 Q 670 350 550 360" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Act to Observe -->
  <path d="M 400 400 Q 300 400 280 300" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Observe to Think -->
  <path d="M 180 260 Q 150 180 350 120" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Memory Integration Box -->
  <rect x="30" y="420" width="200" height="120" rx="8" fill="url(#grad-memory)" stroke="#319795" stroke-width="2"/>
  <text x="130" y="445" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c7a7b">Memory Integration</text>
  
  <rect x="45" y="460" width="170" height="25" rx="4" fill="#e6fffa" stroke="#319795" stroke-width="1"/>
  <text x="130" y="477" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c7a7b">Working: Context</text>
  
  <rect x="45" y="490" width="170" height="25" rx="4" fill="#b2f5ea" stroke="#319795" stroke-width="1"/>
  <text x="130" y="507" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c7a7b">Episodic: Past Actions</text>
  
  <rect x="45" y="520" width="170" height="25" rx="4" fill="#81e6d9" stroke="#319795" stroke-width="1"/>
  <text x="130" y="537" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c7a7b">Semantic: Knowledge</text>

  <!-- Arrows to/from Memory -->
  <path d="M 180 420 Q 230 380 330 360" fill="none" stroke="#4a5568" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <path d="M 230 420 Q 230 380 130 340" fill="none" stroke="#4a5568" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Input/Output -->
  <rect x="350" y="15" width="200" height="45" rx="8" fill="#e2e8f0" stroke="#a0aec0" stroke-width="2"/>
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#4a5568">Task Input</text>
  <text x="450" y="52" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#718096">User query or command</text>
  
  <line x1="450" y1="60" x2="450" y2="80" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="350" y="500" width="200" height="45" rx="8" fill="#c6f6d5" stroke="#38a169" stroke-width="2"/>
  <text x="450" y="520" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#276749">Final Response</text>
  <text x="450" y="537" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">Synthesized answer</text>
  
  <line x1="450" y1="440" x2="450" y2="500" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Loop iteration indicator -->
  <path d="M 540 140 Q 560 160 560 200 Q 560 240 540 260" fill="none" stroke="#e53e3e" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="580" y="210" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#e53e3e">Iterate</text>
  <text x="580" y="225" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#e53e3e">until done</text>

</svg>
