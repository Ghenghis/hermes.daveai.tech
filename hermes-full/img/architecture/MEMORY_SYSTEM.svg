<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <linearGradient id="grad-working" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="grad-episodic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9f7aea;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#805ad5;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="grad-semantic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#38a169;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="grad-agent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed8936;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#dd6b20;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="500" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2d3748">3-Tier Memory Architecture</text>

  <!-- Agent Box (Top) -->
  <rect x="350" y="60" width="300" height="80" rx="8" fill="url(#grad-agent)" stroke="#dd6b20" stroke-width="2"/>
  <text x="500" y="90" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#c05621">AGENT</text>
  <text x="500" y="115" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">Request → Reasoning → Action → Response</text>

  <!-- Arrow from Agent to Working Memory -->
  <line x1="500" y1="140" x2="500" y2="180" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="520" y="165" font-family="Arial, sans-serif" font-size="10" fill="#718096">Read/Write</text>

  <!-- ==================== WORKING MEMORY ==================== -->
  <rect x="50" y="190" width="900" height="130" rx="8" fill="url(#grad-working)" stroke="#3182ce" stroke-width="3"/>
  <text x="500" y="215" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2b6cb0">TIER 1: WORKING MEMORY (Short-Term)</text>
  <text x="500" y="235" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Scope: Single Task | Duration: Task Lifetime | Access: Fast Read/Write</text>

  <!-- Working Memory Components -->
  <rect x="70" y="250" width="170" height="55" rx="4" fill="#ebf8ff" stroke="#3182ce" stroke-width="1"/>
  <text x="155" y="272" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2b6cb0">Context Window</text>
  <text x="155" y="290" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Recent messages</text>
  <text x="155" y="302" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">(sliding window)</text>

  <rect x="260" y="250" width="170" height="55" rx="4" fill="#ebf8ff" stroke="#3182ce" stroke-width="1"/>
  <text x="345" y="272" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2b6cb0">Task State</text>
  <text x="345" y="290" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Current task info</text>
  <text x="345" y="302" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">parameters, progress</text>

  <rect x="450" y="250" width="170" height="55" rx="4" fill="#ebf8ff" stroke="#3182ce" stroke-width="1"/>
  <text x="535" y="272" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2b6cb0">Available Tools</text>
  <text x="535" y="290" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Tool registry</text>
  <text x="535" y="302" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">capabilities</text>

  <rect x="640" y="250" width="170" height="55" rx="4" fill="#ebf8ff" stroke="#3182ce" stroke-width="1"/>
  <text x="725" y="272" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2b6cb0">Intermediate</text>
  <text x="725" y="290" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Calculations</text>
  <text x="725" y="302" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">decisions, results</text>

  <rect x="830" y="250" width="100" height="55" rx="4" fill="#ebf8ff" stroke="#3182ce" stroke-width="1"/>
  <text x="880" y="277" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2b6cb0">Max:</text>
  <text x="880" y="294" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">50 msgs</text>

  <!-- Arrow down from Working to Episodic -->
  <line x1="500" y1="320" x2="500" y2="370" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="520" y="350" font-family="Arial, sans-serif" font-size="10" fill="#718096">Summarize &amp; Store</text>

  <!-- ==================== EPISODIC MEMORY ==================== -->
  <rect x="50" y="380" width="900" height="130" rx="8" fill="url(#grad-episodic)" stroke="#805ad5" stroke-width="3"/>
  <text x="500" y="405" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#6b46c1">TIER 2: EPISODIC MEMORY (Session-Based)</text>
  <text x="500" y="425" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Scope: Session | Duration: Session + Configurable | Access: Indexed Retrieval</text>

  <!-- Episodic Memory Components -->
  <rect x="70" y="440" width="280" height="55" rx="4" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="210" y="462" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#6b46c1">Experience Log (Episode Store)</text>
  <text x="210" y="480" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Completed tasks, actions, outcomes</text>

  <rect x="370" y="440" width="200" height="55" rx="4" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="470" y="462" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#6b46c1">Index by Time</text>
  <text x="470" y="480" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Temporal ordering</text>

  <rect x="590" y="440" width="170" height="55" rx="4" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="675" y="462" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#6b46c1">Index by Task Type</text>
  <text x="675" y="480" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Categorized retrieval</text>

  <rect x="780" y="440" width="150" height="55" rx="4" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="855" y="462" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#6b46c1">Similarity Search</text>
  <text x="855" y="480" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Content similarity</text>

  <!-- Arrow down from Episodic to Semantic -->
  <line x1="500" y1="510" x2="500" y2="560" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="520" y="540" font-family="Arial, sans-serif" font-size="10" fill="#718096">Extract Patterns</text>

  <!-- ==================== SEMANTIC MEMORY ==================== -->
  <rect x="50" y="570" width="900" height="100" rx="8" fill="url(#grad-semantic)" stroke="#38a169" stroke-width="3"/>
  <text x="500" y="595" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#276749">TIER 3: SEMANTIC MEMORY (Long-Term)</text>
  <text x="500" y="615" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Scope: Persistent | Duration: Permanent | Access: Semantic Search (Vector)</text>

  <!-- Semantic Memory Components -->
  <rect x="70" y="625" width="200" height="35" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="170" y="647" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#276749">Learned Patterns</text>

  <rect x="290" y="625" width="200" height="35" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="390" y="647" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#276749">Domain Knowledge</text>

  <rect x="510" y="625" width="200" height="35" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="610" y="647" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#276749">Tool Definitions</text>

  <rect x="730" y="625" width="200" height="35" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="830" y="647" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#276749">Agent Configurations</text>

  <!-- Legend Box -->
  <rect x="30" y="60" width="150" height="90" rx="4" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="105" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d3748">Memory Flow</text>
  <line x1="45" y1="95" x2="75" y2="95" stroke="#4a5568" stroke-width="2"/>
  <polygon points="73,95 83,95 78,89" fill="#4a5568"/>
  <text x="90" y="99" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Data write</text>
  <line x1="45" y1="115" x2="75" y2="115" stroke="#4a5568" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="73,115 83,115 78,109" fill="#4a5568"/>
  <text x="90" y="119" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Query/Retrieve</text>

</svg>
