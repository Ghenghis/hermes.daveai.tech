<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9f7aea;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#805ad5;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#38a169;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed8936;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#dd6b20;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fc8181;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f56565;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="grad-teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fd1c5;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#38b2ac;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="600" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2d3748">Hermes Agent Framework - System Architecture</text>

  <!-- User Interface Layer -->
  <rect x="400" y="60" width="400" height="70" rx="8" fill="url(#grad-blue)" stroke="#4299e1" stroke-width="2"/>
  <text x="600" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2b6cb0">User Interface Layer</text>
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">Web UI | CLI | API Clients | External Services</text>

  <!-- Arrow from UI to Message Bus -->
  <line x1="600" y1="130" x2="600" y2="170" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Message Bus -->
  <rect x="150" y="180" width="900" height="90" rx="8" fill="url(#grad-purple)" stroke="#805ad5" stroke-width="2"/>
  <text x="600" y="205" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#6b46c1">Message Bus (Async Pub/Sub)</text>
  <text x="600" y="230" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">Topic Routing | Priority Queues | Request/Response | Event Broadcasting</text>
  
  <!-- Routing Table Box -->
  <rect x="170" y="235" width="200" height="25" rx="4" fill="#e9d8fd" stroke="#805ad5" stroke-width="1"/>
  <text x="270" y="252" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#553c9a">Routing Table</text>

  <!-- Arrow from Message Bus to Orchestrator -->
  <line x1="600" y1="270" x2="600" y2="310" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Agent Orchestrator -->
  <rect x="350" y="320" width="500" height="140" rx="8" fill="url(#grad-green)" stroke="#38a169" stroke-width="2"/>
  <text x="600" y="345" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#276749">Agent Orchestrator</text>
  
  <!-- Orchestrator Components -->
  <rect x="370" y="360" width="130" height="35" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="435" y="382" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#276749">Task Queue</text>
  
  <rect x="515" y="360" width="130" height="35" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="580" y="382" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#276749">Agent Registry</text>
  
  <rect x="660" y="360" width="130" height="35" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="725" y="382" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#276749">State Manager</text>
  
  <rect x="370" y="405" width="420" height="35" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="1"/>
  <text x="580" y="427" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#276749">Task Router | Error Handler | Resource Allocator</text>

  <!-- Arrow from Orchestrator to Agent Pool -->
  <line x1="600" y1="460" x2="600" y2="500" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Agent Pool -->
  <rect x="100" y="510" width="1000" height="100" rx="8" fill="url(#grad-orange)" stroke="#dd6b20" stroke-width="2"/>
  <text x="600" y="535" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#c05621">Agent Pool</text>
  
  <!-- Agent boxes -->
  <rect x="130" y="550" width="120" height="45" rx="4" fill="#feebc8" stroke="#dd6b20" stroke-width="1"/>
  <text x="190" y="577" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#c05621">Researcher</text>
  
  <rect x="290" y="550" width="120" height="45" rx="4" fill="#feebc8" stroke="#dd6b20" stroke-width="1"/>
  <text x="350" y="577" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#c05621">Coder</text>
  
  <rect x="450" y="550" width="120" height="45" rx="4" fill="#feebc8" stroke="#dd6b20" stroke-width="1"/>
  <text x="510" y="577" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#c05621">Reviewer</text>
  
  <rect x="610" y="550" width="120" height="45" rx="4" fill="#feebc8" stroke="#dd6b20" stroke-width="1"/>
  <text x="670" y="577" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#c05621">Planner</text>
  
  <rect x="770" y="550" width="120" height="45" rx="4" fill="#feebc8" stroke="#dd6b20" stroke-width="1"/>
  <text x="830" y="577" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#c05621">Executor</text>
  
  <rect x="930" y="550" width="120" height="45" rx="4" fill="#feebc8" stroke="#dd6b20" stroke-width="1"/>
  <text x="990" y="577" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#c05621">...</text>

  <!-- Side connections to support systems -->
  <!-- Arrow from Orchestrator to Tool Registry -->
  <line x1="850" y1="400" x2="1020" y2="400" stroke="#4a5568" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="1020" y1="400" x2="1020" y2="630" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow from Orchestrator to Memory System -->
  <line x1="350" y1="400" x2="180" y2="400" stroke="#4a5568" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="180" y1="400" x2="180" y2="630" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Tool Registry -->
  <rect x="870" y="640" width="300" height="120" rx="8" fill="url(#grad-red)" stroke="#c53030" stroke-width="2"/>
  <text x="1020" y="665" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#c53030">Tool Registry</text>
  
  <rect x="885" y="680" width="100" height="30" rx="4" fill="#fff5f5" stroke="#c53030" stroke-width="1"/>
  <text x="935" y="699" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#c53030">web_search</text>
  
  <rect x="1000" y="680" width="100" height="30" rx="4" fill="#fff5f5" stroke="#c53030" stroke-width="1"/>
  <text x="1050" y="699" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#c53030">code_execute</text>
  
  <rect x="885" y="720" width="100" height="30" rx="4" fill="#fff5f5" stroke="#c53030" stroke-width="1"/>
  <text x="935" y="739" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#c53030">file_read</text>
  
  <rect x="1000" y="720" width="100" height="30" rx="4" fill="#fff5f5" stroke="#c53030" stroke-width="1"/>
  <text x="1050" y="739" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#c53030">calculator</text>

  <!-- Memory System -->
  <rect x="30" y="640" width="300" height="180" rx="8" fill="url(#grad-teal)" stroke="#319795" stroke-width="2"/>
  <text x="180" y="665" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c7a7b">Memory System (3-Tier)</text>
  
  <!-- Working Memory -->
  <rect x="45" y="680" width="270" height="40" rx="4" fill="#e6fffa" stroke="#319795" stroke-width="1"/>
  <text x="180" y="695" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2c7a7b">Working Memory (Short-Term)</text>
  <text x="180" y="712" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Context Window | Task State | Intermediate Results</text>
  
  <!-- Episodic Memory -->
  <rect x="45" y="730" width="270" height="40" rx="4" fill="#b2f5ea" stroke="#319795" stroke-width="1"/>
  <text x="180" y="745" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2c7a7b">Episodic Memory (Session)</text>
  <text x="180" y="762" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a5568">Task Episodes | Interactions | Outcomes</text>
  
  <!-- Semantic Memory -->
  <rect x="45" y="780" width="270" height="30" rx="4" fill="#81e6d9" stroke="#319795" stroke-width="1"/>
  <text x="180" y="800" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2c7a7b">Semantic Memory (Long-Term)</text>

  <!-- Arrow from Agents to External World -->
  <line x1="600" y1="610" x2="600" y2="640" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- External World -->
  <rect x="400" y="790" width="400" height="60" rx="8" fill="url(#grad-blue)" stroke="#4299e1" stroke-width="2"/>
  <text x="600" y="815" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2b6cb0">External World</text>
  <text x="600" y="835" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Web APIs | Databases | File System | Code Execution</text>

  <!-- Legend -->
  <rect x="900" y="60" width="250" height="100" rx="4" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="1025" y="80" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3748">Legend</text>
  
  <line x1="915" y1="100" x2="945" y2="100" stroke="#4a5568" stroke-width="2"/>
  <polygon points="943,100 955,100 949,94" fill="#4a5568"/>
  <text x="960" y="104" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Data Flow</text>
  
  <line x1="915" y1="120" x2="945" y2="120" stroke="#4a5568" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="960" y="124" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Control/Query</text>
  
  <rect x="915" y="135" width="25" height="15" rx="2" fill="url(#grad-green)" stroke="#38a169" stroke-width="1"/>
  <text x="960" y="146" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Core Component</text>

</svg>
