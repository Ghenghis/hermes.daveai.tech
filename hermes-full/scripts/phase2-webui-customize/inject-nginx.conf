# Phase 2 Task 2.3 — Nginx sub_filter injection for Hermes customisation
# Add this server block to /etc/nginx/sites-available/hermes-chat
# replacing the existing server block

server {
    listen 80;
    server_name _;   # Replace with your domain or IP

    # ── Proxy to Open WebUI ──────────────────────────────────────────────────
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Inject Hermes banner JS before closing </body> tag
        sub_filter '</body>' '<script src="/hermes/hermes_banner.js"></script></body>';
        sub_filter_once on;
    }

    # ── Serve Hermes custom assets ────────────────────────────────────────────
    location /hermes/ {
        alias /opt/hermes-chat/webui-custom/;
        expires 1h;
        add_header Cache-Control "public";
    }

    # ── Proxy to Hermes Agent Gateway ─────────────────────────────────────────
    location /api/hermes/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/hermes {
        proxy_pass http://localhost:8000/ws/chat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
